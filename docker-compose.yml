version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: milo_db
    environment:
      POSTGRES_DB: milo_campaign
      POSTGRES_USER: milo_user
      POSTGRES_PASSWORD: milo_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U milo_user -d milo_campaign"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (Optional - for Celery)
  redis:
    image: redis:7-alpine
    container_name: milo_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # FastAPI Application
  api:
    build: .
    container_name: milo_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://milo_user:milo_password@db:5432/milo_campaign
      - REDIS_URL=redis://redis:6379/0

volumes:
  postgres_data:
  redis_data:
